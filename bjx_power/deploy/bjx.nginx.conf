# 北极星电力网每日资讯 静态站点
# 部署(把 <USER> 替换为实际用户名后安装):
#   sed "s/<USER>/$USER/g" bjx.nginx.conf | sudo tee /etc/nginx/sites-available/bjx
#   sudo ln -s /etc/nginx/sites-available/bjx /etc/nginx/sites-enabled/bjx
#   sudo nginx -t && sudo systemctl reload nginx
# 前置: nginx 以 www-data 运行, 需能进入用户目录(站点文件默认 umask 022 即可读):
#   chmod o+x "$HOME"
# HTTPS: DNS 生效后执行 sudo certbot --nginx -d bjx.geekbit.org --redirect
#        (certbot 会自动追加 443 server 块与 80->443 跳转)
server {
    listen 80;
    server_name bjx.geekbit.org;
    root /home/<USER>/bjx/site;
    index index.html;

    location / { try_files $uri $uri/ =404; }
    location ~* \.(css|js|png|jpg|jpeg|gif|webp)$ { expires 7d; }
}
